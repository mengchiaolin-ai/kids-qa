<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>端午佳節快樂 🎋</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{
      background:#1a0a00;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:20px;
      font-family:'Noto Serif SC', serif;
    }
    h2{ color:#f5c842; font-size:1rem; margin-bottom:12px; letter-spacing:2px; opacity:.7; }
    #canvas-wrap{
      position:relative;
      width:100%;
      max-width:600px;
    }
    canvas{
      width:100%;
      border-radius:16px;
      box-shadow:0 8px 40px rgba(0,0,0,.6);
      display:block;
    }
    #btn-row{
      margin-top:16px;
      display:flex;
      gap:12px;
      justify-content:center;
    }
    button{
      background:linear-gradient(135deg,#c8972a,#f5c842);
      color:#3a1a00;
      border:none;
      border-radius:50px;
      padding:12px 28px;
      font-family:inherit;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 4px 14px rgba(245,200,66,.35);
    }
    button:active{ transform:scale(.96); }
    #status{ color:#f5c842; font-size:.85rem; margin-top:10px; min-height:20px; text-align:center; opacity:.8; }
  </style>
</head>
<body>
  <h2>🎋 端午佳節祝福圖 🎋</h2>
  <div id="canvas-wrap">
    <canvas id="c" width="1080" height="1080"></canvas>
  </div>
  <div id="btn-row">
    <button onclick="downloadImg()">📥 儲存圖片</button>
  </div>
  <div id="status">圖片製作中，請稍候…</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 1080, H = 1080;
const status = document.getElementById('status');

// ── 色彩主題 ──
const BG_TOP    = '#0d2b1a';
const BG_BOT    = '#1a0a00';
const GOLD      = '#f5c842';
const GOLD2     = '#c8972a';
const RED       = '#c0392b';
const GREEN1    = '#1a6b3a';
const GREEN2    = '#2ecc71';

// ── 工具：畫圓角矩形 ──
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ── 畫背景漸層 ──
function drawBackground(){
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,   '#0a2218');
  grad.addColorStop(0.5, '#102a10');
  grad.addColorStop(1,   '#1a0a00');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
}

// ── 畫竹節圖案（左右兩側）──
function drawBamboo(){
  const drawStalk = (x, heights, color1, color2) => {
    heights.forEach(({y, h, w}) => {
      // 竹節身體
      const g = ctx.createLinearGradient(x, y, x+w, y);
      g.addColorStop(0, color1);
      g.addColorStop(0.5, color2);
      g.addColorStop(1, color1);
      ctx.fillStyle = g;
      roundRect(x, y, w, h-6, 6);
      ctx.fill();
      // 竹節分隔線
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(x, y+h-10, w, 10);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(x, y+h-8, w, 3);
    });
  };

  // 左側竹子
  const leftStalk1 = [];
  for(let y = -20; y < H+20; y+=90) leftStalk1.push({x:30, y, h:85, w:32});
  drawStalk(28, leftStalk1, '#1a5e30','#2ecc71');

  const leftStalk2 = [];
  for(let y = -50; y < H+20; y+=80) leftStalk2.push({x:30, y, h:75, w:24});
  drawStalk(70, leftStalk2, '#145228','#27ae60');

  const leftStalk3 = [];
  for(let y = 20; y < H+20; y+=95) leftStalk3.push({x:30, y, h:90, w:18});
  drawStalk(102, leftStalk3, '#0e3d1e','#1e8449');

  // 右側竹子
  const rightStalk1 = [];
  for(let y = -20; y < H+20; y+=90) rightStalk1.push({x:30, y, h:85, w:32});
  drawStalk(W-62, rightStalk1, '#1a5e30','#2ecc71');

  const rightStalk2 = [];
  for(let y = -40; y < H+20; y+=80) rightStalk2.push({x:30, y, h:75, w:24});
  drawStalk(W-100, rightStalk2, '#145228','#27ae60');

  const rightStalk3 = [];
  for(let y = 10; y < H+20; y+=95) rightStalk3.push({x:30, y, h:90, w:18});
  drawStalk(W-122, rightStalk3, '#0e3d1e','#1e8449');

  // 竹葉（左側）
  drawLeaves(130, 80,  true,  GREEN2);
  drawLeaves(90,  240, false, GREEN1);
  drawLeaves(120, 420, true,  GREEN2);
  drawLeaves(80,  600, false, GREEN1);
  drawLeaves(110, 780, true,  GREEN2);

  // 竹葉（右側）
  drawLeaves(W-130, 120, false, GREEN2);
  drawLeaves(W-90,  300, true,  GREEN1);
  drawLeaves(W-120, 480, false, GREEN2);
  drawLeaves(W-80,  660, true,  GREEN1);
  drawLeaves(W-110, 840, false, GREEN2);
}

function drawLeaves(x, y, leftSide, color){
  ctx.save();
  ctx.translate(x, y);
  const leaves = leftSide
    ? [{a:-0.5,l:55},{a:-0.9,l:45},{a:-0.2,l:50},{a:-1.2,l:38}]
    : [{a:Math.PI+0.5,l:55},{a:Math.PI+0.9,l:45},{a:Math.PI+0.2,l:50},{a:Math.PI+1.2,l:38}];
  leaves.forEach(({a, l}) => {
    ctx.save();
    ctx.rotate(a);
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(10, -l*0.4, 20, -l*0.8, 0, -l);
    ctx.bezierCurveTo(-10, -l*0.8, -5, -l*0.3, 0, 0);
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.75;
    ctx.fill();
    ctx.restore();
  });
  ctx.restore();
}

// ── 畫粽子裝飾 ──
function drawZongzi(x, y, size, angle){
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // 粽葉
  ctx.fillStyle = '#1a7a3a';
  ctx.beginPath();
  ctx.moveTo(0, -size*1.1);
  ctx.lineTo(-size*0.7, size*0.6);
  ctx.lineTo(size*0.7, size*0.6);
  ctx.closePath();
  ctx.fill();

  // 粽子本體
  const g = ctx.createRadialGradient(0,0,size*0.1, 0,0,size*0.7);
  g.addColorStop(0, '#f5c842');
  g.addColorStop(1, '#c8972a');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(0, -size*0.7);
  ctx.lineTo(-size*0.65, size*0.3);
  ctx.lineTo(0, size*0.55);
  ctx.lineTo(size*0.65, size*0.3);
  ctx.closePath();
  ctx.fill();

  // 繩子
  ctx.strokeStyle = RED;
  ctx.lineWidth = size*0.08;
  ctx.beginPath();
  ctx.moveTo(-size*0.5, 0);
  ctx.lineTo(size*0.5, 0);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, -size*0.6);
  ctx.lineTo(0, size*0.5);
  ctx.stroke();

  ctx.restore();
}

// ── 畫龍舟（簡化版）──
function drawDragonBoat(x, y, scale){
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // 船身
  const bg = ctx.createLinearGradient(-150, 0, 150, 0);
  bg.addColorStop(0, RED);
  bg.addColorStop(0.5, '#e74c3c');
  bg.addColorStop(1, RED);
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.moveTo(-150, 0);
  ctx.bezierCurveTo(-150, 30, 150, 30, 150, 0);
  ctx.bezierCurveTo(120, -15, -120, -15, -150, 0);
  ctx.fill();

  // 龍頭
  ctx.fillStyle = GOLD;
  ctx.beginPath();
  ctx.ellipse(-160, -8, 22, 14, -0.3, 0, Math.PI*2);
  ctx.fill();

  // 龍眼
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-168, -12, 4, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-167, -13, 1.5, 0, Math.PI*2);
  ctx.fill();

  // 槳（簡化）
  ctx.strokeStyle = GOLD2;
  ctx.lineWidth = 3;
  [-80,-40,0,40,80].forEach(px => {
    ctx.beginPath();
    ctx.moveTo(px, -10);
    ctx.lineTo(px-15, -35);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px, 10);
    ctx.lineTo(px+15, 35);
    ctx.stroke();
  });

  ctx.restore();
}

// ── 畫金色祥雲 ──
function drawCloud(x, y, size, alpha){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = GOLD;
  const circles = [
    {dx:0,   dy:0,  r:size},
    {dx:size*1.2, dy:size*0.2, r:size*0.8},
    {dx:-size*1.2,dy:size*0.2, r:size*0.8},
    {dx:size*2.1, dy:size*0.5, r:size*0.65},
    {dx:-size*2.1,dy:size*0.5, r:size*0.65},
    {dx:size*0.6, dy:size*0.6, r:size*0.7},
    {dx:-size*0.6,dy:size*0.6, r:size*0.7},
  ];
  circles.forEach(({dx,dy,r}) => {
    ctx.beginPath();
    ctx.arc(x+dx, y+dy, r, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.restore();
}

// ── 畫金色邊框 ──
function drawFrame(){
  // 外框
  ctx.strokeStyle = GOLD2;
  ctx.lineWidth = 8;
  roundRect(24, 24, W-48, H-48, 24);
  ctx.stroke();

  // 內框（細線）
  ctx.strokeStyle = GOLD;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.5;
  roundRect(36, 36, W-72, H-72, 18);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // 四角花紋
  [
    [50, 50, 0],
    [W-50, 50, Math.PI/2],
    [W-50, H-50, Math.PI],
    [50, H-50, -Math.PI/2],
  ].forEach(([cx, cy, rot]) => {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rot);
    ctx.strokeStyle = GOLD;
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.9;
    // L形裝飾
    ctx.beginPath();
    ctx.moveTo(0, -30); ctx.lineTo(0, 0); ctx.lineTo(30, 0);
    ctx.stroke();
    // 小菱形
    ctx.fillStyle = GOLD;
    ctx.beginPath();
    ctx.moveTo(0,-8); ctx.lineTo(8,0); ctx.lineTo(0,8); ctx.lineTo(-8,0);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  });
}

// ── 畫主標題文字 ──
function drawTitle(){
  // 標題背景橫幅
  const bx = W*0.5, by = 145;
  ctx.save();
  ctx.shadowColor = 'rgba(245,200,66,0.6)';
  ctx.shadowBlur  = 30;

  // 底色
  const bg = ctx.createLinearGradient(bx-300, by-50, bx+300, by+50);
  bg.addColorStop(0, 'rgba(20,40,20,0)');
  bg.addColorStop(0.3, 'rgba(10,30,10,0.7)');
  bg.addColorStop(0.7, 'rgba(10,30,10,0.7)');
  bg.addColorStop(1, 'rgba(20,40,20,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(bx-300, by-60, 600, 110);

  // 主標題
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold 92px 'Noto Serif SC', serif`;
  // 外描邊
  ctx.strokeStyle = '#3a1a00';
  ctx.lineWidth = 8;
  ctx.strokeText('端午佳節快樂', bx, by);
  // 金色漸層填色
  const tg = ctx.createLinearGradient(bx-300, by-40, bx+300, by+40);
  tg.addColorStop(0,   '#fff0a0');
  tg.addColorStop(0.3, '#f5c842');
  tg.addColorStop(0.6, '#ffe066');
  tg.addColorStop(1,   '#c8972a');
  ctx.fillStyle = tg;
  ctx.fillText('端午佳節快樂', bx, by);

  ctx.restore();

  // 副標題
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `400 32px 'Noto Serif SC', serif`;
  ctx.fillStyle = 'rgba(245,200,66,0.7)';
  ctx.fillText('Dragon Boat Festival', W/2, 210);
  ctx.restore();

  // 裝飾橫線
  const lx = W/2, ly = 235;
  ctx.save();
  ctx.strokeStyle = GOLD2;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.moveTo(lx-200, ly); ctx.lineTo(lx+200, ly);
  ctx.stroke();
  // 中間菱形
  ctx.fillStyle = GOLD;
  ctx.globalAlpha = 0.8;
  ctx.beginPath();
  ctx.moveTo(lx,-6+ly); ctx.lineTo(lx+8,ly); ctx.lineTo(lx,6+ly); ctx.lineTo(lx-8,ly);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ── 畫底部祝福文字 ──
function drawFooter(){
  const by = H - 110;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `700 38px 'Noto Serif SC', serif`;
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur  = 10;
  const fg = ctx.createLinearGradient(W/2-200, 0, W/2+200, 0);
  fg.addColorStop(0, '#c8972a');
  fg.addColorStop(0.5, '#f5c842');
  fg.addColorStop(1, '#c8972a');
  ctx.fillStyle = fg;
  ctx.fillText('粽情粽意 · 闔家安康', W/2, by);
  ctx.restore();
}

// ── 主渲染函式 ──
async function render(){
  // 1. 背景
  drawBackground();

  // 2. 祥雲（背景層）
  drawCloud(200, 300, 18, 0.06);
  drawCloud(850, 200, 22, 0.06);
  drawCloud(500, 500, 15, 0.04);
  drawCloud(150, 700, 20, 0.05);
  drawCloud(900, 750, 18, 0.05);

  // 3. 竹子
  drawBamboo();

  // 4. 載入並繪製照片
  await new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const photoW = 820, photoH = 600;
      const photoX = (W - photoW) / 2;
      const photoY = 265;

      // 照片底部陰影
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.7)';
      ctx.shadowBlur  = 30;
      roundRect(photoX, photoY, photoW, photoH, 18);
      ctx.fillStyle = '#000';
      ctx.fill();
      ctx.restore();

      // 裁切照片為圓角
      ctx.save();
      roundRect(photoX, photoY, photoW, photoH, 18);
      ctx.clip();
      ctx.drawImage(img, photoX, photoY, photoW, photoH);
      ctx.restore();

      // 照片邊框
      ctx.save();
      ctx.strokeStyle = GOLD2;
      ctx.lineWidth = 5;
      roundRect(photoX, photoY, photoW, photoH, 18);
      ctx.stroke();
      ctx.restore();

      // 照片上方漸層遮罩（讓標題更清晰）
      const topMask = ctx.createLinearGradient(0, photoY, 0, photoY+120);
      topMask.addColorStop(0, 'rgba(10,30,10,0.85)');
      topMask.addColorStop(1, 'rgba(10,30,10,0)');
      ctx.save();
      roundRect(photoX, photoY, photoW, 120, 18);
      ctx.clip();
      ctx.fillStyle = topMask;
      ctx.fillRect(photoX, photoY, photoW, 120);
      ctx.restore();

      // 照片底部漸層遮罩
      const botMask = ctx.createLinearGradient(0, photoY+photoH-100, 0, photoY+photoH);
      botMask.addColorStop(0, 'rgba(10,20,10,0)');
      botMask.addColorStop(1, 'rgba(5,15,5,0.9)');
      ctx.save();
      roundRect(photoX, photoY+photoH-100, photoW, 100, 0);
      ctx.clip();
      ctx.fillStyle = botMask;
      ctx.fillRect(photoX, photoY+photoH-100, photoW, 100);
      ctx.restore();

      resolve();
    };
    img.onerror = () => {
      // 照片載入失敗，畫佔位框
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      roundRect(130, 265, 820, 600, 18);
      ctx.fill();
      ctx.strokeStyle = GOLD2;
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.fillStyle = 'rgba(245,200,66,0.4)';
      ctx.textAlign = 'center';
      ctx.font = '28px serif';
      ctx.fillText('📷 照片區', W/2, 570);
      ctx.restore();
      resolve();
    };
    img.src = 'photo.jpg';
  });

  // 5. 粽子裝飾
  drawZongzi(180, 265, 44,  0.3);
  drawZongzi(900, 285, 38, -0.4);
  drawZongzi(155, 840, 36,  0.5);
  drawZongzi(920, 820, 42, -0.2);

  // 6. 龍舟（底部）
  drawDragonBoat(W/2, H-55, 0.58);

  // 7. 祥雲（前景層）
  drawCloud(80,  160, 14, 0.18);
  drawCloud(W-80,160, 14, 0.18);
  drawCloud(80,  H-160,14, 0.15);
  drawCloud(W-80,H-160,14,0.15);

  // 8. 邊框
  drawFrame();

  // 9. 標題文字
  drawTitle();

  // 10. 底部祝福
  drawFooter();

  status.textContent = '✅ 製作完成！點「儲存圖片」下載';
}

function downloadImg(){
  const link = document.createElement('a');
  link.download = '端午佳節快樂.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// 啟動
render().catch(e => {
  status.textContent = '⚠️ 發生錯誤：' + e.message;
  console.error(e);
});
</script>
</body>
</html>
